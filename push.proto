
syntax = "proto3";

option cc_generic_services=false;

package PushProto;

//缺省数据
message DefaultNotify
{
    sint32 resultCode = 1;      //结果码
}

//服务器维护
message ServerUpdateNotify
{
    sint32 iMinutes = 1;//分钟数
}

//通知类型
enum NotifyType
{
    NOTIFY_DEFAULT = 0; //默认
    CONNECTION_IDLE  = 1; //长时间没有操作游戏
    SERVICE_MAINTAIN = 2; //当前服务处理维护中
}

//用户更新通知
message ServerChangeNotify
{
    sint32 iNotifyType = 1; //提示编号
    sint32 iReturnLoginGUI = 2; //返回登录界面(1-返回，0-不返回)
}

message PropsInfo
{
    sint32 iPropsID      = 1;    //道具id
    sint64 iPropsCount   = 2;    //道具数量
    sint32 iChangeType   = 3;
}

//道具变更通知
message PropsChangeNotify
{
    repeated PropsInfo vecPropsInfo = 1;
}

//账号冻结状态通知
message UserAccountForbiddenNotify
{
    bool bForbidden = 1; //是否冻结
}
